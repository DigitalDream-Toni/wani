<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 120" width="300" height="120">
  <!-- Green Shield Background -->
  <defs>
    <linearGradient id="shieldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2d8659;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d5a3d;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Shield shape -->
  <path d="M 30 20 L 30 50 Q 30 80 60 95 Q 90 80 90 50 L 90 20 Z" 
        fill="url(#shieldGradient)" 
        stroke="#0d3d24" 
        stroke-width="1.5"/>
  
  <!-- Shield Border Highlight -->
  <path d="M 32 22 L 32 50 Q 32 77 60 90 Q 85 77 85 50 L 85 22 Z" 
        fill="none" 
        stroke="#4db878" 
        stroke-width="1" 
        opacity="0.6"/>
  
  <!-- Inner Circle (Gear/Emblem) -->
  <circle cx="60" cy="50" r="22" fill="white" stroke="#0d3d24" stroke-width="0.5"/>
  
  <!-- Gear teeth (simplified) -->
  <g fill="#2d8659">
    <rect x="58" y="26" width="4" height="6" rx="2"/>
    <rect x="58" y="66" width="4" height="6" rx="2"/>
    <rect x="75" y="48" width="6" height="4" ry="2"/>
    <rect x="33" y="48" width="6" height="4" ry="2"/>
  </g>
  
  <!-- Center circle -->
  <circle cx="60" cy="50" r="12" fill="#2d8659"/>
  <circle cx="60" cy="50" r="8" fill="white" stroke="#2d8659" stroke-width="0.5"/>
  
  <!-- Inner gear pattern -->
  <circle cx="60" cy="50" r="5" fill="#2d8659" opacity="0.7"/>
  
  <!-- Text: RIVERS STATE -->
  <text x="105" y="45" 
        font-family="Arial, sans-serif" 
        font-size="14" 
        font-weight="600" 
        fill="#2d8659" 
        letter-spacing="1">RIVERS STATE</text>
  
  <!-- Text: UNIVERSITY -->
  <text x="105" y="65" 
        font-family="Arial, sans-serif" 
        font-size="14" 
        font-weight="700" 
        fill="#1a1a4d" 
        letter-spacing="0.5">UNIVERSITY</text>
</svg>
